<div class="base">
  <mat-form-field class="full-width shrink" appearance="outline" [class.liftup]="dropDown" (click)="dropDown=!dropDown">

    <button type="button" matPrefix mat-icon-button (click)="scrollLeft($event)" color="primary" aria-label="Scroll chips left">
      <mat-icon>keyboard_arrow_left</mat-icon>
    </button>

    <div class="chip-scroll" #chipScroll>
      <mat-chip-set aria-label="Selected items">
        <mat-chip *ngFor="let node of selectedNodes; trackBy: trackByValue"
                  (click)="$event.stopPropagation()">
          {{ node.name }}
          <button matChipRemove aria-label="Remove {{ node.name }}" (click)="remove(node, $event)">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip>
      </mat-chip-set>
      <span class="chip-placeholder" *ngIf="selectedNodes.length === 0">{{ placeholder }}</span>
    </div>

    <button type="button" matSuffix mat-icon-button (click)="scrollRight($event)" color="primary" aria-label="Scroll chips right">
      <mat-icon>keyboard_arrow_right</mat-icon>
    </button>
    <button type="button" matSuffix mat-icon-button color="primary" aria-label="Toggle overlay">
      <mat-icon>{{ dropDown ? 'arrow_drop_up' : 'arrow_drop_down' }}</mat-icon>
    </button>

  </mat-form-field>

  <div class="overlay" [class.slideUp]="!dropDown">
    <div class="overlay-tree">
      <sp-treeview
        [nodes]="nodes"
        [config]="config"
        [template]="template"
        [contextPrototype]="contextPrototype"
        (change)="onChange($event)"
        (delete)="onDelete($event)"
        (addChild)="onAddChild($event)"
        (loadChildren)="onLoadChildren($event)">
      </sp-treeview>
    </div>
    <div class="done">
      <button type="button" mat-raised-button color="primary" (click)="dropDown=false">
        Done
      </button>
    </div>
  </div>
</div>

<div class="cvr-screen" *ngIf="dropDown" (click)="$event.stopPropagation(); dropDown=false;"></div>
