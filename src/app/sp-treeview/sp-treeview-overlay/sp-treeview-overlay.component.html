<div class="base">
  <div class="field-outline full-width shrink" [class.liftup]="dropDown" (click)="dropDown=!dropDown">

    <div class="chip-scroll" #chipScroll>
      <mat-chip-set aria-label="Selected items">
        @for (node of selectedNodes; track node.value) {
          <mat-chip (click)="$event.stopPropagation()">
            {{ node.name }}
            <button matChipRemove aria-label="Remove {{ node.name }}" (click)="remove(node, $event)">
              <mat-icon>cancel</mat-icon>
            </button>
          </mat-chip>
        }
      </mat-chip-set>
      @if (selectedNodes.length === 0) {
        <span class="chip-placeholder">{{ placeholder }}</span>
      }
    </div>

    <button type="button" mat-icon-button color="primary" aria-label="Toggle overlay">
      <mat-icon>{{ dropDown ? 'arrow_drop_up' : 'arrow_drop_down' }}</mat-icon>
    </button>

  </div>

  <div class="overlay" [class.slideUp]="!dropDown">
    <div class="overlay-tree">
      <sp-treeview
        [nodes]="nodes"
        [config]="config"
        [template]="template"
        [contextPrototype]="contextPrototype"
        (change)="onChange($event)"
        (delete)="onDelete($event)"
        (addChild)="onAddChild($event)"
        (loadChildren)="onLoadChildren($event)">
      </sp-treeview>
    </div>
    <div class="done">
      <button type="button" mat-raised-button color="primary" (click)="dropDown=false">
        Done
      </button>
    </div>
  </div>
</div>

@if (dropDown) {
  <div class="cvr-screen" (click)="$event.stopPropagation(); dropDown=false;"></div>
}
